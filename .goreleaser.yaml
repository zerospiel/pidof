version: 2

project_name: pidof

before:
  hooks:
    - go mod tidy

builds:
  - id: pidof
    main: ./cmd
    binary: pidof
    flags:
      - -trimpath
    ldflags:
      - >-
        -s -w
        -X github.com/zerospiel/macos-pidof/internal/pidof.version={{ if .Env.VERSION }}{{ .Env.VERSION }}{{ else }}{{ .Version }}{{ end }}
        -X github.com/zerospiel/macos-pidof/internal/pidof.buildTime={{ if .Env.BUILD_TIME }}{{ .Env.BUILD_TIME }}{{ else }}{{ .Date }}{{ end }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: tarballs
    formats:
      - tar.gz
    ids:
      - pidof
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" -}}Darwin
      {{- else if eq .Os "linux" -}}Linux
      {{- else -}}{{ .Os }}{{- end -}}_
      {{- if eq .Arch "amd64" -}}x86_64
      {{- else if eq .Arch "386" -}}i386
      {{- else if eq .Arch "arm64" -}}arm64{{- else -}}{{ .Arch }}{{- end -}}

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  use: github
  format: "{{ .SHA }}: {{ .Message }}{{ with .AuthorUsername }} by @{{ . }}{{ end }}"
  filters:
    exclude:
      - "^test:"
      - "^test\\("
      - "^(build|ci): "
      - "^ci\\("
      - "^chore:"
      - "^chore\\("
      - "merge conflict"
      - Merge pull request
      - Merge remote-tracking branch
      - Merge branch
  groups:
    - title: "🚀 New Features 🚀"
      regexp: '^.*?(feat|enh|enhancement)(\([[:word:]]+\))??!?:.+$'
      order: 100
    - title: "🔐 Security updates 🔐"
      regexp: '^.*?sec(\([[:word:]]+\))??!?:.+$'
      order: 150
    - title: "🐛 Notable Fixes 🐛"
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 200
    - title: "📄 Documentation updates 📄"
      regexp: ^.*?docs?(\([[:word:]]+\))??!?:.+$
      order: 300
    - title: "✨ Notable Changes ✨"
      order: 9999

snapshot:
  version_template: "{{ .Version }}-next"

release:
  github:
    owner: zerospiel
    name: macos-pidof
  name_template: "{{ .ProjectName }} {{ .Tag }}"
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## macos-pidof {{ .Tag }}

    TODO:
    ---
  footer: |
    ---
    ## Homebrew

    Install:

    brew install zerospiel/tools/pidof

    Thanks for using macos-pidof.
    ---
    **Full Changelog**: https://github.com/zerospiel/macos-pidof/compare/{{ .PreviousTag }}...{{ .Tag }}

brews:
  - name: pidof
    ids:
      - tarballs
    directory: Formula
    repository:
      owner: zerospiel
      name: homebrew-tools
      branch: master
      token: "{{ .Env.GITHUB_TOKEN }}"
    homepage: https://github.com/zerospiel/macos-pidof
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    license: "MIT"
    skip_upload: auto
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    description: Cross-UNIX pidof replacement for Linux and macOS
    test: |
      assert_match "pidof", shell_output("#{bin}/pidof --version")
